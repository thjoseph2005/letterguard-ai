<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="LetterGuard AI chat">
        <header class="chat-header">
          <p class="eyebrow">Local Document QA Agent</p>
          <h1>{{ app_name }}</h1>
          <p class="subtitle">Ask questions in natural language and review the response directly in the chat.</p>
        </header>

        <div id="chat-log" class="chat-log" aria-live="polite"></div>

        <form id="chat-form" class="chat-form">
          <label class="sr-only" for="message">Message</label>
          <textarea
            id="message"
            name="message"
            rows="3"
            placeholder="Ask LetterGuard AI something..."
            autocomplete="off"
            required
          ></textarea>
          <div class="composer-actions">
            <p class="hint">Enter to send, Shift+Enter for newline</p>
            <button id="send-button" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script src="{{ url_for('static', path='/chat.js') }}" defer></script>
  </body>
</html>
